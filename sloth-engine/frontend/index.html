<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Sloth Engine</title>
<link rel="manifest" href="/manifest.json">
<style>
/* ═══ CSS Reset & Variables ═══ */
:root {
  --bg-primary: #0f0f1a;
  --bg-secondary: #1a1a2e;
  --bg-tertiary: #252540;
  --text-primary: #e0e0ff;
  --text-secondary: #8888aa;
  --text-muted: #555577;
  --accent: #6c5ce7;
  --accent-hover: #7f70f0;
  --accent-dim: #4a3db5;
  --success: #00b894;
  --error: #e17055;
  --warning: #fdcb6e;
  --border: #2a2a44;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
}

/* ═══ Layout ═══ */
#app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100%;
  max-height: 100dvh;
}

/* ═══ Header ═══ */
header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  padding-top: calc(8px + var(--safe-top));
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

#menu-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 20px;
  padding: 8px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  touch-action: manipulation;
}
#menu-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }

.project-select {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  min-width: 0;
  flex: 1;
  max-width: 200px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 4px;
}

.header-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 16px;
  padding: 8px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  touch-action: manipulation;
}
.header-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }

/* ═══ Sidebar ═══ */
#sidebar {
  position: fixed;
  top: 0;
  left: -300px;
  width: 300px;
  height: 100%;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  z-index: 200;
  transition: left 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar.open { left: 0; }

#sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 199;
  display: none;
}
#sidebar.open + #sidebar-overlay { display: block; }

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: calc(16px + var(--safe-top));
}

.sidebar-header h2 { font-size: 16px; font-weight: 600; }

#new-chat-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  touch-action: manipulation;
}
#new-chat-btn:hover { background: var(--accent-hover); }

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.chat-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  touch-action: manipulation;
}
.chat-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.chat-item.active { background: var(--accent-dim); color: var(--text-primary); }

/* ═══ Chat Area ═══ */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px;
  padding-bottom: calc(16px + var(--safe-bottom));
  scroll-behavior: smooth;
}

.message {
  margin-bottom: 16px;
  max-width: 100%;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.message-user {
  display: flex;
  justify-content: flex-end;
}

.message-user .bubble {
  background: var(--accent);
  color: white;
  padding: 10px 14px;
  border-radius: var(--radius) var(--radius) 4px var(--radius);
  max-width: 80%;
  word-wrap: break-word;
  font-size: 15px;
  line-height: 1.5;
}

.message-assistant .bubble {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  padding: 12px 14px;
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
  max-width: 90%;
  word-wrap: break-word;
  font-size: 15px;
  line-height: 1.6;
  overflow-wrap: break-word;
}

.message-assistant .bubble pre {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 13px;
  margin: 8px 0;
}

.message-assistant .bubble code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--bg-primary);
  padding: 2px 6px;
  border-radius: 4px;
}

.message-assistant .bubble a {
  color: var(--accent-hover);
  text-decoration: underline;
}

.tool-result {
  background: var(--bg-primary);
  border-left: 3px solid var(--accent-dim);
  padding: 8px 12px;
  margin: 4px 0;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 12px;
  color: var(--text-secondary);
  font-family: var(--mono);
  max-height: 200px;
  overflow-y: auto;
}

.generated-image {
  margin: 12px 0;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}
.generated-image img {
  width: 100%;
  max-width: 512px;
  display: block;
  border-radius: var(--radius) var(--radius) 0 0;
}
.generated-image .img-caption {
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-primary);
}

.artifact-embed {
  margin: 12px 0;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}
.artifact-embed .artifact-header {
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
}
.artifact-embed iframe {
  width: 100%;
  min-height: 200px;
  height: 400px;
  border: none;
  display: block;
}

.video-embed {
  margin: 12px 0;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  aspect-ratio: 16/9;
}
.video-embed iframe,
.video-embed video {
  width: 100%;
  height: 100%;
  display: block;
}

.thinking-block {
  background: rgba(108, 92, 231, 0.05);
  border-left: 3px solid var(--accent-dim);
  padding: 8px 12px;
  margin: 4px 0;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}

.godot-artifact iframe {
  width: 100%;
  min-height: 300px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: #000;
  margin: 8px 0;
}

.typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 4px 0;
}
.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: blink 1.4s infinite both;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

/* ═══ Input Area ═══ */
#input-area {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 12px;
  padding-bottom: calc(12px + var(--safe-bottom));
}

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  max-width: 900px;
  margin: 0 auto;
}

#message-input {
  flex: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 12px 16px;
  border-radius: 24px;
  font-size: 15px;
  font-family: var(--font);
  resize: none;
  max-height: 120px;
  line-height: 1.4;
  outline: none;
  transition: border-color 0.2s;
}
#message-input:focus { border-color: var(--accent); }
#message-input::placeholder { color: var(--text-muted); }

.input-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
  touch-action: manipulation;
  transition: all 0.2s;
}

#voice-btn {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}
#voice-btn:hover { background: var(--border); }
#voice-btn.recording { background: var(--error); color: white; }

#send-btn {
  background: var(--accent);
  color: white;
}
#send-btn:hover { background: var(--accent-hover); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ═══ Auth Modal ═══ */
#auth-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
}
#auth-modal.hidden { display: none; }

.auth-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  width: 90%;
  max-width: 400px;
}

.auth-card h2 { margin-bottom: 16px; text-align: center; font-size: 20px; }

.auth-field {
  margin-bottom: 12px;
}
.auth-field label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.auth-field input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: var(--radius-sm);
  font-size: 14px;
  outline: none;
}
.auth-field input:focus { border-color: var(--accent); }

#auth-submit {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  color: white;
  border-radius: var(--radius-sm);
  font-size: 15px;
  cursor: pointer;
  margin-top: 8px;
}
#auth-submit:hover { background: var(--accent-hover); }

/* ═══ Scrollbar ═══ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ═══ Responsive ═══ */
@media (min-width: 768px) {
  .message-user .bubble { max-width: 60%; }
  .message-assistant .bubble { max-width: 75%; }
  .project-select { max-width: 250px; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <h2>Chats</h2>
      <button id="new-chat-btn" onclick="newChat()">+ New</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
  </nav>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Header -->
  <header>
    <div class="header-left">
      <button id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <select class="project-select" id="project-select" onchange="selectProject(this.value)">
        <option value="">All Projects</option>
      </select>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="newChat()" title="New chat">+</button>
      <button class="header-btn" onclick="document.getElementById('model-select').classList.toggle('hidden')" title="Model">&#9881;</button>
    </div>
  </header>

  <!-- Model Selector (dropdown) -->
  <select id="model-select" class="project-select" style="position:absolute;top:48px;right:12px;z-index:150;display:none" onchange="this.style.display='none'">
    <option value="glm-5.1">GLM-5.1</option>
  </select>

  <!-- Chat -->
  <main id="chat-area">
    <div class="message message-assistant">
      <div class="bubble">
        Welcome to <strong>Sloth Engine</strong>. I can search the web, run commands, browse pages, build UIs with GodotStrap, and much more. What would you like to do?
      </div>
    </div>
  </main>

  <!-- Input -->
  <footer id="input-area">
    <div class="input-row">
      <button id="voice-btn" class="input-btn" onclick="toggleVoice()" title="Voice input">&#127908;</button>
      <textarea id="message-input" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" class="input-btn" onclick="sendMessage()">&#10148;</button>
    </div>
  </footer>
</div>

<!-- Auth Modal -->
<div id="auth-modal" class="hidden">
  <div class="auth-card">
    <h2>Sloth Engine</h2>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" value="admin">
    </div>
    <div class="auth-field">
      <label>API Token</label>
      <input type="password" id="auth-token">
    </div>
    <button id="auth-submit" onclick="authSubmit()">Connect</button>
  </div>
</div>

<!-- Marked.js for markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
// ═══ State ═══
const API_BASE = window.location.origin;
let authToken = localStorage.getItem('sloth_token') || '';
let currentUser = localStorage.getItem('sloth_user') || '';
let currentChatId = null;
let currentProjectId = null;
let isStreaming = false;
let fullResponse = '';

// ═══ Init ═══
(async function init() {
  marked.setOptions({ breaks: true, gfm: true, sanitize: true });
  if (authToken) {
    await loadProjects();
    loadChats();
  } else {
    document.getElementById('auth-modal').classList.remove('hidden');
  }
})();

// ═══ Auth ═══
async function authSubmit() {
  const email = document.getElementById('auth-email').value;
  const token = document.getElementById('auth-token').value;
  if (!token) return;
  authToken = token;
  currentUser = email;
  localStorage.setItem('sloth_token', token);
  localStorage.setItem('sloth_user', email);
  document.getElementById('auth-modal').classList.add('hidden');
  await loadProjects();
  loadChats();
}

// ═══ API Helper ═══
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const resp = await fetch(`${API_BASE}${path}`, { ...opts, headers });
  if (resp.status === 401) {
    document.getElementById('auth-modal').classList.remove('hidden');
    throw new Error('Unauthorized');
  }
  return resp;
}

// ═══ Projects ═══
async function loadProjects() {
  try {
    const resp = await api('/api/projects');
    const projects = await resp.json();
    const sel = document.getElementById('project-select');
    sel.innerHTML = '<option value="">All Projects</option>';
    projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      sel.appendChild(opt);
    });
  } catch (e) { console.error('Failed to load projects:', e); }
}

function selectProject(id) {
  currentProjectId = id ? parseInt(id) : null;
  loadChats();
}

// ═══ Chats ═══
async function loadChats() {
  try {
    const path = currentProjectId ? `/api/chats?project_id=${currentProjectId}` : '/api/chats';
    const resp = await api(path);
    const chats = await resp.json();
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    chats.forEach(c => {
      const div = document.createElement('div');
      div.className = 'chat-item' + (c.id === currentChatId ? ' active' : '');
      div.textContent = c.title;
      div.onclick = () => loadChat(c.id);
      list.appendChild(div);
    });
  } catch (e) { console.error('Failed to load chats:', e); }
}

async function loadChat(chatId) {
  currentChatId = chatId;
  toggleSidebar(false);
  try {
    const resp = await api(`/api/chats/${chatId}/messages`);
    const messages = await resp.json();
    const area = document.getElementById('chat-area');
    area.innerHTML = '';
    messages.forEach(m => appendMessage(m.role, m.content));
    scrollBottom();
    // Update sidebar active state
    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  } catch (e) { console.error('Failed to load chat:', e); }
}

async function newChat() {
  currentChatId = null;
  const area = document.getElementById('chat-area');
  area.innerHTML = '<div class="message message-assistant"><div class="bubble">New conversation started. What would you like to do?</div></div>';
  toggleSidebar(false);
}

// ═══ Send Message ═══
async function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  autoResize(input);
  appendMessage('user', text);
  isStreaming = true;
  fullResponse = '';
  document.getElementById('send-btn').disabled = true;

  // Show typing indicator
  const typing = document.createElement('div');
  typing.className = 'message message-assistant';
  typing.id = 'streaming-msg';
  typing.innerHTML = '<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  document.getElementById('chat-area').appendChild(typing);
  scrollBottom();

  try {
    const body = {
      message: text,
      chat_id: currentChatId,
      project_id: currentProjectId,
    };

    const resp = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`,
      },
      body: JSON.stringify(body),
    });

    if (resp.status === 401) {
      document.getElementById('auth-modal').classList.remove('hidden');
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    // Get or create the response bubble
    let bubble = document.querySelector('#streaming-msg .bubble');
    if (!bubble) return;
    let currentContent = '';
    let toolResults = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          switch (event.type) {
            case 'token':
              currentContent += event.content;
              fullResponse += event.content;
              // Preserve embeds across re-renders
              const existingEmbeds = bubble.querySelectorAll('.generated-image, .artifact-embed, .video-embed, .thinking-block, .tool-result');
              bubble.innerHTML = renderMarkdown(currentContent);
              existingEmbeds.forEach(el => bubble.appendChild(el));
              break;
            case 'thinking':
              let thinkBlock = bubble.querySelector('.thinking-block');
              if (!thinkBlock) {
                thinkBlock = document.createElement('div');
                thinkBlock.className = 'thinking-block';
                thinkBlock.style.display = 'none';
                bubble.appendChild(thinkBlock);
              }
              thinkBlock.textContent += event.content;
              break;
            case 'tool_result':
              toolResults.push(event.content);
              const toolEl = document.createElement('div');
              toolEl.className = 'tool-result';
              toolEl.textContent = event.content;
              bubble.appendChild(toolEl);
              break;
            case 'tool_calls':
              for (const tc of event.calls) {
                const tcEl = document.createElement('div');
                tcEl.className = 'tool-result';
                tcEl.textContent = `Calling: ${tc.function?.name || tc.name}(...)`;
                tcEl.style.color = 'var(--accent-hover)';
                bubble.appendChild(tcEl);
              }
              break;
            case 'image':
              const imgEl = document.createElement('div');
              imgEl.className = 'generated-image';
              const safeImgUrl = sanitizeUrl(API_BASE + event.url);
              if (safeImgUrl) {
                imgEl.innerHTML = `<img src="${safeImgUrl}" alt="${escapeHtml(event.prompt || 'Generated image')}" loading="lazy" /><div class="img-caption">${escapeHtml(event.prompt || 'Generated image')}</div>`;
              }
              bubble.appendChild(imgEl);
              currentContent += `\n\n![${event.prompt || 'image'}](${event.url})`;
              fullResponse += `\n\n![${event.prompt || 'image'}](${event.url})`;
              scrollBottom();
              break;
            case 'artifact':
              const artEl = document.createElement('div');
              artEl.className = 'artifact-embed';
              const safeArtUrl = sanitizeUrl(API_BASE + event.url);
              if (safeArtUrl) {
                artEl.innerHTML = `<div class="artifact-header">${escapeHtml(event.title || 'Artifact')}</div><iframe src="${safeArtUrl}" sandbox="allow-scripts" loading="lazy"></iframe>`;
              }
              bubble.appendChild(artEl);
              currentContent += `\n\n[${event.title || 'Artifact'}](${event.url})`;
              fullResponse += `\n\n[${event.title || 'Artifact'}](${event.url})`;
              scrollBottom();
              break;
            case 'video':
              const vidEl = document.createElement('div');
              vidEl.className = 'video-embed';
              const safeVidUrl = sanitizeUrl(event.embed_url);
              if (event.video_type === 'youtube' && safeVidUrl) {
                vidEl.innerHTML = `<iframe src="${safeVidUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>`;
              } else if (safeVidUrl) {
                vidEl.innerHTML = `<video controls preload="metadata" src="${safeVidUrl}" style="width:100%;max-height:400px"></video>`;
              }
              bubble.appendChild(vidEl);
              currentContent += `\n\n[Video: ${event.query || 'video'}](${event.embed_url})`;
              fullResponse += `\n\n[Video: ${event.query || 'video'}](${event.embed_url})`;
              scrollBottom();
              break;
            case 'done':
              if (event.chat_id && !currentChatId) {
                currentChatId = event.chat_id;
                loadChats();
              }
              break;
            case 'error':
              bubble.innerHTML += `<div style="color:var(--error);margin-top:8px">${escapeHtml(event.content)}</div>`;
              break;
          }
        } catch (e) { /* skip malformed JSON */ }
      }
      scrollBottom();
    }

    // Final render — preserve embedded iframes/videos/images (renderMarkdown would wipe them)
    const embeds = bubble.querySelectorAll('.generated-image, .artifact-embed, .video-embed');
    bubble.innerHTML = renderMarkdown(currentContent);
    embeds.forEach(el => bubble.appendChild(el));
    // Re-add tool results
    toolResults.forEach(tr => {
      const toolEl = document.createElement('div');
      toolEl.className = 'tool-result';
      toolEl.textContent = tr;
      bubble.appendChild(toolEl);
    });
    // Embed Godot artifacts
    embedGodotArtifacts(bubble);

  } catch (e) {
    const bubble = document.querySelector('#streaming-msg .bubble');
    if (bubble) {
      bubble.innerHTML += `<div style="color:var(--error);margin-top:8px">Connection error: ${escapeHtml(e.message)}</div>`;
    }
    console.error('Chat error:', e);
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    const streaming = document.getElementById('streaming-msg');
    if (streaming) streaming.id = '';
    scrollBottom();
  }
}

// ═══ Rendering Helpers ═══
function renderMarkdown(text) {
  if (!text) return '';
  // Process Godot artifacts
  let html = text.replace(/\[GODOT_ARTIFACT\](.*?)\[\/GODOT_ARTIFACT\]/g,
    (_, url) => { const s = sanitizeUrl(url); return s ? `<div class="godot-artifact"><iframe src="${s}" sandbox="allow-scripts" allow="fullscreen"></iframe></div>` : ''; });
  return marked.parse(html);
}

function embedGodotArtifacts(container) {
  // Already handled in renderMarkdown
}

function appendMessage(role, content) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `message message-${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'assistant') {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    bubble.textContent = content;
  }
  div.appendChild(bubble);
  area.appendChild(div);
  scrollBottom();
}

function escapeHtml(text) {
  const el = document.createElement('div');
  el.textContent = text;
  return el.innerHTML;
}

function sanitizeUrl(url) {
  try {
    const parsed = new URL(url, window.location.origin);
    if (!['http:', 'https:'].includes(parsed.protocol)) return '';
    // Block private/internal addresses
    const host = parsed.hostname;
    if (host === 'localhost' || host === '127.0.0.1' || host === '::1' || host.endsWith('.local')) return '';
    if (/^(10\.|172\.(1[6-9]|2\d|3[01])\.|192\.168\.|169\.254\.|0\.)/.test(host)) return '';
    return parsed.href;
  } catch { return ''; }
}

function scrollBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

// ═══ Voice Input ═══
let mediaRecorder = null;
let isRecording = false;

async function toggleVoice() {
  const btn = document.getElementById('voice-btn');
  if (isRecording) {
    mediaRecorder.stop();
    btn.classList.remove('recording');
    isRecording = false;
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    const chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = () => {
        const b64 = reader.result.split(',')[1];
        // Send audio as message — will be handled by STT tool
        document.getElementById('message-input').value = `[Audio input: ${blob.size} bytes]`;
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    isRecording = true;
  } catch (e) {
    console.error('Voice error:', e);
    alert('Microphone access denied');
  }
}

// ═══ Sidebar ═══
function toggleSidebar(forceState) {
  const sidebar = document.getElementById('sidebar');
  const isOpen = forceState !== undefined ? !forceState : sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
}

// ═══ Input Helpers ═══
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
